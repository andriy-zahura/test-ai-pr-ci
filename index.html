<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in</title>
    <script>
      (function () {
        var stored = localStorage.getItem("app_theme");
        var theme =
          stored === "light" || stored === "dark"
            ? stored
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="card">
      <h1 id="form-title">Welcome back</h1>
      <p id="form-subtitle" class="subtitle">Sign in to continue.</p>

      <form id="auth-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="At least 6 characters"
            minlength="6"
            required
          />
        </div>

        <p id="error" class="error" hidden></p>

        <button id="submit" class="btn btn-primary" type="submit">Sign in</button>
      </form>

      <button id="mode-toggle" class="btn btn-ghost" type="button">
        Need an account? Sign up
      </button>
    </main>

    <script type="module" src="dist/login.js"></script>
  </body>
</html>
